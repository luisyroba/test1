<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NBA Real Test</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07101c;
      --surface: #0f1a2b;
      --surface-2: #162337;
      --border: rgba(148,163,184,.18);
      --text: #eef2ff;
      --muted: #94a3b8;
      --accent: #60a5fa;
      --danger: #f87171;
      --ok: #34d399;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(180deg, #07101c 0%, #0b1220 100%);
      color: var(--text);
    }
    .wrap {
      width: min(1180px, calc(100% - 24px));
      margin: 0 auto;
      padding: 22px 0 40px;
    }
    .topbar, .analysis-box, .game-list, .panel-card, .pick-card {
      border: 1px solid var(--border);
      background: rgba(15,26,43,.92);
      border-radius: 18px;
    }
    .topbar {
      padding: 18px;
      margin-bottom: 16px;
    }
    .topbar h1 { margin: 0 0 6px; font-size: 28px; }
    .topbar p { margin: 0; color: var(--muted); }
    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 16px;
      align-items: start;
    }
    .game-list {
      padding: 12px;
      position: sticky;
      top: 16px;
    }
    .status {
      color: var(--muted);
      font-size: 14px;
      margin: 0 0 12px;
    }
    .games-stack {
      display: grid;
      gap: 10px;
    }
    .game-btn {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 14px;
      padding: 12px;
      text-align: left;
      cursor: pointer;
    }
    .game-btn:hover { border-color: rgba(96,165,250,.42); }
    .matchup { font-weight: 800; margin-bottom: 4px; }
    .meta, .muted, .eyebrow, .mini-title { color: var(--muted); }
    .analysis-box { padding: 16px; min-height: 420px; }
    .header-row h3 { margin: 0 0 4px; font-size: 24px; }
    .pick-card {
      margin: 14px 0;
      padding: 14px;
      background: linear-gradient(180deg, #142238 0%, #0f1b2b 100%);
    }
    .pick-card.no-bet { border-color: rgba(248,113,113,.26); }
    .pick-main { font-size: 25px; font-weight: 900; margin: 8px 0 10px; }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }
    .chips span {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(96,165,250,.14);
      color: #dbeafe;
      font-size: 12px;
      font-weight: 700;
    }
    .derived {
      margin-top: 8px;
      color: #fde68a;
      font-size: 13px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 14px;
    }
    .panel-card {
      padding: 14px;
      background: var(--surface-2);
    }
    .panel-card h4 { margin: 0 0 10px; }
    .line-item {
      padding: 7px 0;
      border-top: 1px solid rgba(148,163,184,.10);
      color: #dce6f2;
      font-size: 14px;
    }
    .line-item:first-of-type { border-top: 0; }
    .line-item.empty { color: var(--muted); }
    .loading {
      padding: 20px;
      color: var(--muted);
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .game-list { position: static; }
      .stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="topbar">
      <h1>NBA real test</h1>
      <p>App de prueba separada basada en la lógica de la principal: juegos reales de ESPN, cuotas de Odds API y lineups/availability para validar picks sin tocar producción.</p>
    </section>

    <section class="layout">
      <aside class="game-list">
        <p id="status" class="status">Cargando...</p>
        <div id="games" class="games-stack"></div>
      </aside>

      <section id="analysis"></section>
    </section>
  </main>
  <script src="app.js?v=2" defer></script>
</body>
</html>
