<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NBA Picks Demo</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1220;
      --panel: #111a2b;
      --panel-2: #162338;
      --border: rgba(148,163,184,.16);
      --text: #edf2f7;
      --muted: #94a3b8;
      --blue: #60a5fa;
      --green: #34d399;
      --yellow: #fbbf24;
      --red: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(180deg, #08101d 0%, #0b1220 100%);
      color: var(--text);
    }
    .wrap {
      width: min(1100px, calc(100% - 24px));
      margin: 0 auto;
      padding: 24px 0 48px;
    }
    .hero {
      margin-bottom: 20px;
      padding: 18px;
      border-radius: 18px;
      background: rgba(17,26,43,.9);
      border: 1px solid var(--border);
    }
    .hero h1 { margin: 0 0 8px; font-size: 28px; }
    .hero p { margin: 0; color: var(--muted); line-height: 1.45; }
    .app-grid {
      display: grid;
      gap: 18px;
    }
    .game-card {
      background: rgba(17,26,43,.92);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,.22);
    }
    .game-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .game-top h2 { margin: 0 0 4px; font-size: 22px; }
    .time, .projection span, .eyebrow, .subhead { color: var(--muted); }
    .projection {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 13px;
      text-align: right;
    }
    .pick-card, .summary-box, .lineup-card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
    }
    .pick-card { margin-bottom: 14px; }
    .pick-card.nobet { border-color: rgba(248,113,113,.26); }
    .pick-main {
      font-size: 24px;
      font-weight: 800;
      margin: 6px 0 10px;
      color: #f8fafc;
    }
    .pick-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }
    .pick-meta span {
      background: rgba(96,165,250,.15);
      color: #dbeafe;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
    }
    .summary-box ul, .lineup-card ul {
      margin: 10px 0 0;
      padding-left: 18px;
      color: #d7e0ea;
    }
    .summary-box p { margin: 8px 0 0; line-height: 1.45; }
    .lineups-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 14px;
    }
    .lineup-card h4 { margin: 0 0 8px; }
    .derived {
      margin-top: 8px;
      color: var(--yellow);
      font-size: 13px;
    }
    @media (max-width: 700px) {
      .game-top { flex-direction: column; }
      .projection { text-align: left; }
      .lineups-grid { grid-template-columns: 1fr; }
      .pick-main { font-size: 21px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>Demo simple NBA picks</h1>
      <p>Versión de prueba para validar render de picks, cuotas mínimas 1.50, líneas alternativas y lineups visibles sin depender todavía de toda la app real.</p>
    </section>
    <section id="app" class="app-grid"></section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
